name: Compliance Template Dev

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies and make build
        run: |
          # In CI/CD or fresh environments
          NODE_ENV=development pnpm install
          pnpm build
          # Copy pnpm-workspace.yaml so better-sqlite3 is allowed to compile
          cp pnpm-workspace.yaml build/
          # Move build outside the workspace so pnpm doesn't find the parent workspace
          mv build /tmp/app-build
          cd /tmp/app-build
          pnpm i --prod
      - name: Deploy Code to Server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -azr --delete --update --exclude=.env
          path: /tmp/app-build/
          remote_path: /home/ubuntu/template-compliance
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: ${{ secrets.DEPLOY_PORT }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
      - name: Run migrations and restart server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /home/ubuntu/template-compliance
            # node ace migration:run --force
            # pm2 restart compliance-app || pm2 start bin/server.js --name compliance-app